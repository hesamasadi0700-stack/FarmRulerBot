plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}
android {
    namespace 'com.farmbot.ruler'
    compileSdk 34
    defaultConfig {
        applicationId "com.farmbot.ruler"
        minSdk 24
        targetSdk 34
        versionCode 5
        versionName "5.0"
    }
}
dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
